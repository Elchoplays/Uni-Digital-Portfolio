<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>El Seaton | Digital Design Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              'arup-red': '#D41E26',
              'arup-dark-gray': '#333333',
              'arup-medium-gray': '#4A4A4A',
              'arup-light-gray': '#F2F2F2',
            },
            fontFamily: {
              sans: ['Roboto', 'sans-serif'],
            }
          }
        }
      }
    </script>
    <script>
      const storedTheme = localStorage.getItem('portfolio-theme');
      if (storedTheme === 'dark') {
        document.documentElement.classList.add('dark');
      }
    </script>
    <style>
      /* For smooth scrolling */
      html {
        scroll-behavior: smooth;
        color-scheme: light;
      }
      html.dark {
        color-scheme: dark;
      }
      body {
        margin: 0;
        background: linear-gradient(180deg, #f7f8fb 0%, #f4f5f8 100%);
        transition: background 0.3s ease, color 0.3s ease;
      }
      html.dark body {
        background: linear-gradient(180deg, #0f172a 0%, #020617 100%);
        color: #f8fafc;
      }
      * {
        box-sizing: border-box;
      }
      ::selection {
        background: rgba(212, 30, 38, 0.2);
      }
      @media (prefers-reduced-motion: reduce) {
        html {
          scroll-behavior: auto;
        }
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "vite": "https://aistudiocdn.com/vite@^7.2.2",
    "@vitejs/plugin-react": "https://aistudiocdn.com/@vitejs/plugin-react@^5.1.1",
    "path": "https://aistudiocdn.com/path@^0.12.7"
  }
}
</script>
</head>

    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
